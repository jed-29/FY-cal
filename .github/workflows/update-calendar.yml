name: Update fiscal calendar

on:
  schedule:
    - cron: "0 6 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-calendar:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Générer le calendrier
        run: python generate_calendar.py

      - name: Sauvegarder le calendrier généré
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add calendrier-fiscal.ics
          git commit -m "Update fiscal calendar" || echo "No changes to commit"
          git push
